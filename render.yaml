services:
  - type: web
    name: threadlux-api
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: threadlux-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: threadlux-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: threadlux-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: threadlux-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: threadlux-db
          property: password
      - key: FEDAPAY_ENVIRONMENT
        value: sandbox
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_PUBLIC_KEY
        sync: false
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false

databases:
  - name: threadlux-db
    region: frankfurt
    plan: free
